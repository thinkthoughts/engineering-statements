title: The Sun's Mass Demystifies Care

question: >
  Where do care obligations originate before they are expressed as
  institutions, ethics, or social policies?

claim: >
  Care is inherited, sustained, and specified.
  Human care relationships emerge within physical and biological systems
  supported by the Sun's energy.

context:
  - The Sun's mass supports the energy systems that sustain life on Earth.
  - Life depends on water, atmosphere, biology, and reproduction.
  - Human beings inherit care through intergenerational relationships.

observation:
  - Grandparents care for parents.
  - Parents care for children.
  - Children inherit care and responsibility.
  - Care exists before formal institutions and ethical frameworks.

constraint:
  - Care requires energy, time, and material resources.
  - Human flourishing depends on stable biological and social systems.
  - Relationships cannot be reduced to prices.

translation:
  pi:
    - expand thoughts
    - recognize interdependence

  "π":
    - extend care
    - family
    - community
    - future generations

  "Π":
    - resist immediate division
    - preserve continuity
    - prefer long-term stewardship

specifications:
  - SDG 5 translates care into institutions.
  - Ahimsa translates care into behavior.
  - Both are specifications of care rather than origins of care.

