id: 2509.10445

title: Wafer-Scale Uniformity Specifies Scalable Quantum Photonics

date: 2026-06-27

status: complete

statement: >
  Wafer-scale uniformity specifies scalable quantum photonics.
  Uniform low-loss fabrication preserves reproducible squeezing across
  integrated Si3N4 microresonator chips, enabling multiplexed
  entanglement and manufacturable continuous-variable quantum photonic
  processors.

leading_specification:
  Wafer-scale uniformity

engineering_question: >
  Can strong squeezed-light generation be made uniform, reproducible,
  and manufacturable across a CMOS-compatible integrated photonics wafer?

constraint_chain:
  - CMOS-compatible fabrication
  - ultralow-loss Si3N4 microresonators
  - uniform coupling
  - cascaded pump filtering
  - reproducible two-mode squeezing
  - wafer-scale measurement
  - multiplexed entanglement
  - continuous-variable quantum processors

leading_indicators:
  - propagation loss
  - coupling uniformity
  - resonator quality factor
  - pump suppression
  - measured squeezing
  - wafer-to-wafer reproducibility
  - die-to-die variation

trailing_indicators:
  - scalable entangled states
  - continuous-variable processor size
  - manufacturable quantum photonics
  - deployable integrated quantum systems

