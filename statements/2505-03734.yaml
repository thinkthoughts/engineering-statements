id: 2505.03734

title: Broadband Squeezing Specifies Quantum Microcombs

date: 2026-06-29

status: complete

statement: >
  Broadband squeezing specifies quantum microcombs. A chip-scale,
  tunable, multi-mode squeezed-light source enables the resource needed
  for scalable integrated continuous-variable quantum computing,
  sensing, and many-mode photonic entanglement.

leading_specification:
  Broadband squeezed frequency comb

engineering_question: >
  Can one integrated silicon nitride microresonator generate broadband,
  tunable, multi-mode squeezed light across enough modes to function as
  a scalable quantum microcomb resource?

constraint_chain:
  - frequency multiplexing
  - silicon nitride microresonator
  - Kerr nonlinearity
  - four-wave mixing
  - below-threshold optical parametric amplification
  - two-mode squeezing
  - broadband tunability
  - multi-mode quantum microcomb
  - many-mode entanglement
  - continuous-variable quantum computing

leading_indicators:
  - number of squeezed modes
  - squeezing level
  - tuning bandwidth
  - resonator quality factor
  - pump stability
  - on-chip loss
  - detection fidelity

trailing_indicators:
  - cluster-state scale
  - continuous-variable processor size
  - sensing performance
  - deployable integrated quantum systems

