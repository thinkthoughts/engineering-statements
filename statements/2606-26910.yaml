id: 2606.26910

title: Optical Loss Specifies Photonic Quantum Scale

date: 2026-06-27

status: complete

statement: >
  Optical loss specifies photonic quantum scale. Reducing compound loss
  across generation, routing, fusion, and measurement preserves
  entanglement, increases usable graph size, and advances fault-tolerant
  integrated quantum photonics.

leading_specification:
  Optical loss budget

engineering_question: >
  Which optical losses most strongly constrain scalable photonic quantum
  computation?

constraint_chain:
  - fabrication
  - ultralow-loss Si3N4
  - integrated EPR sources
  - low-loss fusion
  - state analysis
  - multipartite entanglement
  - fault-tolerant scaling

