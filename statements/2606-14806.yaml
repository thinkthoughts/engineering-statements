claim:
  summary: >
    If gravity remains classical while coupling to quantum matter through
    semiclassical Einstein equations, the resulting weak-field dynamics
    become nonlinear and may efficiently solve NP-complete problems.
    Therefore, if observed computational constraints hold, at least one
    assumption of the semiclassical framework is likely incorrect.

observation:
  summary: >
    The Physical Extended Church–Turing Thesis (PECTT) states that no
    physically realizable process efficiently solves NP-complete problems.
    Semiclassical gravity appears to violate this principle by introducing
    nonlinear quantum evolution with enhanced computational power.

