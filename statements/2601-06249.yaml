title: Neural Networks Demystify String Theory

paper: arXiv:2601.06249

claim: >
  Infinite-width neural-network ensembles can reproduce
  key mathematical structures of bosonic string theory.
  Network correlators match string-theory correlators,
  including structures related to Veneziano and
  Virasoro-Shapiro amplitudes.

