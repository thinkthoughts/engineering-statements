id: 2606-16076
title: Context Demystifies Forecasting

statement: >
  Forecasting improves when constraints shape hidden state rather than
  only predictions. Phys-JEPA separates latent representation into a
  physical component and a residual component, so measurable structure
  can guide state transitions across time.

context:
  - time-series forecasting
  - latent world models
  - JEPA
  - physical constraints
  - hidden state
  - state-transition consistency
  - climate
  - traffic
  - electricity

claims:
  - Forecasts depend on hidden state.
  - Hidden states can be accurate while remaining physically meaningless.
  - Physical variables should constrain latent transitions, not only output predictions.
  - Separating physical and residual latent state improves interpretability and long-horizon stability.

method:
  - Encode history into latent state.
  - Decompose latent state into physical and residual components.
  - Constrain the physical component according to known or soft physical structure.
  - Decode constrained latent transitions into future forecasts.

equations:
  - "latent_state = physical_state + residual_state"
  - "forecast = decode(constrained_state_transition)"
  - "1 + 1 > |1.4i| ≠ $0.96"
  - "c = √(E/m)"

source:
  arxiv: "2606.16076v1"
  title: "Phys-JEPA: A Physics-informed Joint Embedding Predictive Architecture for Time Series Forecasting"
  url: "https://arxiv.org/html/2606.16076v1"

