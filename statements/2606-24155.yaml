claim: >
  Frontier AI reliability is not specified by a single benchmark score.
  It is specified by evaluation trajectories that expose reasoning process,
  hallucination propagation, stress robustness, calibration, recovery, and
  behavioral change over time.

summary: >
  MedBench v5 motivates a shift from static answer accuracy toward dynamic,
  process-aware evaluation. The leading specification is the evaluation
  trajectory: a structured record of how a model reasons, where it fails,
  how errors propagate, and whether the system recovers under stress.
  This report generalizes that principle from medical benchmarking toward
  frontier AI evaluation infrastructure.

