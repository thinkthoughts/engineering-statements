engineering:
  question: >
    Can neutron-star magnetic fields convert axion dark matter
    into detectable radio photons?

  answer: >
    arXiv:2606.17067 searches two XDINS targets with FAST
    in the 1.0–1.5 GHz band. No significant spectral line is
    detected, and the result sets new ACL-method limits in the
    4.14–6.20 eV axion-mass range.

