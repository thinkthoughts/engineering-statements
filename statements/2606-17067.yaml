id: 2606-17067

title: Radio Lines Demystify Axion Dark Matter

paper: arXiv:2606.17067

claim: >
  Axion dark matter models can be tested through
  axion-photon conversion searches in strong magnetic fields.
  Radio observations of neutron-star environments can search
  for narrow spectral lines produced by this conversion.

