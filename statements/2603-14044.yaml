id: 2603.14044

title: Dispersion Engineering Specifies Quantum Microcombs

date: 2026-06-29

status: complete

statement: >
  Dispersion engineering specifies quantum microcombs. By controlling
  resonator dispersion, phase matching, and Kerr nonlinear dynamics,
  integrated photonics can generate efficient, broadband, and uniform
  quantum states across many frequency modes.

leading_specification:
  Engineered dispersion

engineering_question: >
  Can resonator dispersion be engineered to phase-match Kerr four-wave
  mixing and generate scalable quantum microcomb resources across many
  optical modes?

constraint_chain:
  - waveguide geometry
  - resonator dispersion
  - integrated dispersion
  - phase matching
  - Kerr nonlinearity
  - four-wave mixing
  - two-mode squeezing
  - quantum microcomb
  - many-mode entanglement
  - integrated photonic circuits

