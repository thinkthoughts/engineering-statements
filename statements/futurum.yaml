  - Gate Speed
  - Fidelity
  - Connectivity
  - Circuit Depth

engineering_chain:
  - Architecture
  - Hardware Properties
  - System Specifications
  - Useful Computation

equation: |
  Architecture
      ↓
  Hardware Properties
      ↓
  System Specifications
      ↓
  Useful Computation

principles:
  - Leading specifications identify engineering constraints.
  - System-level specifications connect hardware behavior to user value.
  - Better architectures improve system specifications through better hardware properties.
  - Engineering metrics mature as they move from components toward outcomes.

