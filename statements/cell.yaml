equations:
  - C = {DNA replication, gene expression, membrane growth, protein synthesis, division}
  - Φ(C) → closed cell cycle
  - closed cell cycle ⇒ cellular integration
  - cellular integration → autonomous metabolism + homeostasis + sensing + adaptive regulation + evolution

