id: agapi-agents
title: Engineering Statements With AGAPI-Agents

source:
  paper: https://arxiv.org/abs/2512.11935
  github: https://github.com/atomgptlab/agapi
  feature: https://climatereality.app/statements/
  repo: https://github.com/thinkthoughts/engineering-statements

objective: >
  Connect AGAPI-style agentic scientific infrastructure with portable
  Engineering Statements that specify claims, constraints, evidence,
  workflows, outputs, and next steps.

contexts:
  - agentic science
  - materials discovery
  - open scientific infrastructure
  - scientific reasoning workflows
  - reproducible research artifacts

constraints:
  - preserve scientific intent
  - support collaboration rather than centralization
  - keep outputs inspectable and reproducible
  - complement existing scientific tools and repositories

evidence:
  - AGAPI paper
  - AGAPI GitHub repository
  - Climate Reality statements feature
  - Engineering Statements examples derived from recent papers

outputs:
  - feature page
  - YAML statements
  - companion notebooks
  - lab reports
  - reusable templates

next_steps:
  - read the AGAPI paper
  - inspect the AGAPI repository
  - compare AGAPI workflows with Engineering Statements
  - explore how Engineering Statements might complement agentic science systems
  - provide feedback on the specification structure

